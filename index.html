<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Grassroots Insurance</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;

      /* Fullscreen GIF background */
      background: url("grass 2.gif") center center / cover no-repeat;

      display: flex;
      justify-content: center;
      align-items: center;

      position: relative;
      font-family: Arial, sans-serif;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 0;
    }

    #particleCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .logo {
      position: relative;
      z-index: 2;

      width: min(80vw, 700px);
      height: auto;
      object-fit: contain;

      filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
    }

    @media (max-width: 600px) {
      .logo {
        width: 90vw;
      }
    }
  </style>
</head>

<body>

  <canvas id="particleCanvas"></canvas>

  <img 
    src="Grassroots logo.svg" 
    alt="Grassroots Insurance Logo" 
    class="logo"
  />

  <script>
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const particles = [];
    const particleCount = 45;

    class BubbleParticle {
      constructor() {
        this.reset();
        this.y = Math.random() * canvas.height; 
      }

      reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 20; // Start just below screen
        this.size = Math.random() * 3 + 1; // Bubble size variation (1px to 4px)
        this.speedY = Math.random() * 1.2 + 0.4; // Upward speed
        this.speedX = Math.random() * 0.4 - 0.2; // Initial slight drift
        this.opacity = Math.random() * 0.4 + 0.2; // Soft transparency
        this.wobbleSpeed = Math.random() * 0.02 + 0.01;
        this.wobbleDistance = Math.random() * 0.5 + 0.2;
      }

      update() {
        this.y -= this.speedY;

        this.x += Math.sin(this.y * this.wobbleSpeed) * this.wobbleDistance;

        if (this.y < canvas.height * 0.15) {
          this.opacity -= 0.005;
        }

        if (this.y < 0 || this.opacity <= 0) {
          this.reset();
        }
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
  
        ctx.shadowBlur = 6;
        ctx.shadowColor = 'rgba(255, 255, 255, 0.4)';
        
        ctx.fill();
      }
    }

    for (let i = 0; i < particleCount; i++) {
      particles.push(new BubbleParticle());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      
      requestAnimationFrame(animate);
    }
    
    animate();
  </script>

</body>
</html>
